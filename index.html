<!DOCTYPE html>
<html lang="tr">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Python Akademi - 9.Sınıf Bilişim</title>

<script src="https://cdn.tailwindcss.com"></script>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

<style>

body{
font-family:Segoe UI;
}

.console{
background:#020617;
color:#22c55e;
font-family:monospace;
}

.topic{
transition:.25s;
}

.topic:hover{
transform:translateX(6px);
background:#ede9fe;
}

.editor{
background:black;
color:#22c55e;
font-family:monospace;
}

</style>

</head>

<body class="bg-gray-100 dark:bg-gray-900 min-h-screen">

<!-- HEADER -->

<div class="bg-white dark:bg-gray-800 shadow p-6 flex justify-between items-center">

<h1 class="text-3xl font-bold text-purple-700">

🐍 Python Akademi

</h1>

<div class="flex items-center gap-6">

<input id="search"
placeholder="Konu ara..."
class="border p-2 rounded"/>

<div>

Konu
<span id="progressText"></span>
/
<span id="topicTotal"></span>

</div>

<div class="w-64 h-3 bg-gray-200 rounded">

<div id="progressBar"
class="h-3 bg-purple-600 rounded"></div>

</div>

<div>

⭐ XP
<span id="scoreText">0</span>

</div>

<button onclick="toggleDark()">🌙</button>

</div>

</div>

<div class="flex max-w-7xl mx-auto mt-8 gap-6">

<!-- SIDEBAR -->

<div
id="sidebar"
class="w-80 bg-white dark:bg-gray-800 p-4 rounded shadow overflow-auto h-[85vh]"></div>

<!-- MAIN -->

<div
class="flex-1 bg-white dark:bg-gray-800 p-10 rounded shadow">

<div id="content"></div>

<!-- EDITOR -->

<div class="mt-10">

<h2 class="text-2xl font-bold mb-4">

Python Kodunu Dene

</h2>

<textarea
id="editor"
class="editor w-full h-64 p-4 rounded"></textarea>

<div class="flex gap-4 mt-4">

<button
onclick="runPython()"
class="bg-green-600 text-white px-6 py-2 rounded">

Çalıştır

</button>

<button
onclick="resetCode()"
class="bg-gray-300 px-6 py-2 rounded">

Sıfırla

</button>

</div>

<div
id="console"
class="console mt-6 p-4 h-40 rounded overflow-auto"></div>

</div>

<!-- QUIZ -->

<div class="mt-12">

<h2 class="text-2xl font-bold mb-4">

Mini Quiz

</h2>

<div id="quizArea"></div>

</div>

</div>

</div>

<script>

let pyodide
let score=localStorage.getItem("score")||0
let current=localStorage.getItem("topic")||0

score=parseInt(score)
current=parseInt(current)

async function initPython(){

pyodide = await loadPyodide()

console.log("Python hazır")

}

initPython()

const topics=[

{title:"Bilişim Etiği",
desc:"Bilişim etiği internette doğru davranış kurallarıdır.",
code:"print('Bilişim Etiği öğreniyorum')",
quiz:{q:"Bilişim etiği nedir?",a:["İnternette doğru davranış","Bilgisayarı kırmak","Virüs yapmak"],c:0}
},

{title:"Fikri Mülkiyet",
desc:"Telif hakkı eser sahibini korur.",
code:"print('Telif hakkı')"
},

{title:"Algoritma",
desc:"Bir problemi çözmek için adım adım yapılan işlemler.",
code:"print('Algoritma öğreniyorum')"
},

{title:"Akış Diyagramı",
desc:"Algoritmanın şekillerle gösterilmesidir.",
code:"print('Akış diyagramı')"
},

{title:"Python Nedir",
desc:"Python kolay öğrenilen güçlü bir programlama dilidir.",
code:"print('Python öğreniyorum')"
},

{title:"print()",
desc:"Ekrana çıktı verir.",
code:"print('Merhaba Dünya')"
},

{title:"Değişkenler",
desc:"Verileri saklamak için kullanılır.",
code:"yas=15\nprint(yas)"
},

{title:"Veri Tipleri",
desc:"int float str bool",
code:"print(type(10))"
},

{title:"input",
desc:"Kullanıcıdan veri alır.",
code:"ad=input('Adın: ')\nprint(ad)"
},

{title:"Matematik",
desc:"Python matematik işlemleri yapabilir.",
code:"print(5+10)"
},

{title:"if",
desc:"Koşul yapısı.",
code:"yas=20\nif yas>18:\n print('Yetişkin')"
},

{title:"for",
desc:"Tekrar döngüsü.",
code:"for i in range(5):\n print(i)"
},

{title:"while",
desc:"Koşula bağlı döngü.",
code:"i=0\nwhile i<5:\n print(i)\n i+=1"
},

{title:"Liste",
desc:"Birden fazla veri saklar.",
code:"liste=[1,2,3]\nprint(liste)"
},

{title:"Fonksiyon",
desc:"Tekrar kullanılabilir kod.",
code:"def selam():\n print('Merhaba')\nselam()"
},

{title:"math",
desc:"Matematik kütüphanesi.",
code:"import math\nprint(math.sqrt(25))"
},

{title:"random",
desc:"Rastgele sayı üretir.",
code:"import random\nprint(random.randint(1,10))"
},

{title:"String",
desc:"Metin işlemleri.",
code:"a='python'\nprint(a.upper())"
},

{title:"Dosya",
desc:"Dosya işlemleri.",
code:"f=open('a.txt','w')\nf.write('merhaba')\nf.close()"
},

{title:"Proje",
desc:"Artık kendi Python programlarını yazabilirsin.",
code:"print('Python öğrendim!')"
}

]

topicTotal.innerText=topics.length

function sidebar(){

let html=""

topics.forEach((t,i)=>{

html+=`

<div
class="topic p-3 rounded cursor-pointer"
onclick="go(${i})">

${i+1}. ${t.title}

</div>

`

})

sidebar.innerHTML=html

}

function loadTopic(){

let t=topics[current]

content.innerHTML=`

<h2 class="text-4xl font-bold mb-6">

${t.title}

</h2>

<p class="text-lg">

${t.desc}

</p>

`

editor.value=t.code

progressText.innerText=current+1

progressBar.style.width=((current+1)/topics.length*100)+"%"

scoreText.innerText=score

loadQuiz()

save()

}

function loadQuiz(){

let t=topics[current]

if(!t.quiz){

quizArea.innerHTML="Bu konu için quiz yok"

return

}

let html=`<p class="font-bold mb-3">${t.quiz.q}</p>`

t.quiz.a.forEach((a,i)=>{

html+=`

<button
onclick="answer(${i})"
class="block bg-gray-200 p-2 rounded mb-2 w-full">

${a}

</button>

`

})

quizArea.innerHTML=html

}

function answer(i){

let q=topics[current].quiz

if(i==q.c){

score+=10

alert("Doğru! +10 XP")

}else{

alert("Yanlış")

}

scoreText.innerText=score

save()

}

async function runPython(){

let code=editor.value

try{

let result=await pyodide.runPythonAsync(code)

console.innerText=result||"Kod çalıştı"

}catch(e){

console.innerText=e

}

}

function resetCode(){

editor.value=topics[current].code

}

function go(i){

current=i

loadTopic()

}

function toggleDark(){

document.body.classList.toggle("dark")

}

function save(){

localStorage.setItem("score",score)
localStorage.setItem("topic",current)

}

sidebar()
loadTopic()

</script>

</body>
</html>
