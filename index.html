<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Python Akademi</title>

<script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#0f172a;
color:white;
}

header{
background:#020617;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 0 10px black;
}

button{
padding:8px 15px;
border:none;
border-radius:6px;
cursor:pointer;
background:#7c3aed;
color:white;
}

.container{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#020617;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px black;
transition:.3s;
cursor:pointer;
}

.card:hover{
transform:scale(1.05);
}

textarea{
width:100%;
height:220px;
background:black;
color:#22c55e;
font-family:monospace;
padding:10px;
border-radius:8px;
}

.console{
background:black;
color:#22c55e;
padding:10px;
height:150px;
overflow:auto;
margin-top:10px;
border-radius:8px;
}

input{
padding:8px;
border-radius:6px;
border:none;
margin:5px;
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:flex;
align-items:center;
justify-content:center;
}

.hidden{
display:none;
}

.box{
background:#020617;
padding:25px;
border-radius:10px;
width:300px;
}

</style>

</head>

<body>

<header>

<h2>🐍 Python Akademi</h2>

<div>

<button onclick="openLogin()">Giriş</button>
<button onclick="openAdmin()">Admin</button>

</div>

</header>

<div id="app" class="container"></div>

<div id="loginModal" class="modal hidden">

<div class="box">

<h3>Giriş</h3>

<input id="username" placeholder="Kullanıcı adı">

<button onclick="login()">Giriş Yap</button>

</div>

</div>

<div id="adminModal" class="modal hidden">

<div class="box">

<h3>Admin</h3>

<input id="adminpass" type="password" placeholder="Şifre">

<button onclick="adminLogin()">Giriş</button>

</div>

</div>

<script>

let pyodide

async function init(){
pyodide = await loadPyodide()
}

init()

let user = localStorage.getItem("user")

let xp = Number(localStorage.getItem("xp") || 0)

const lessons=[

{
title:"Python Nedir",
desc:"Python başlangıç dersi",
code:`print("Merhaba Python")`
},

{
title:"Değişken",
desc:"Veri saklama",
code:`isim="Ahmet"
print(isim)`
},

{
title:"if",
desc:"Koşullar",
code:`yas=20

if yas>18:
    print("Yetişkin")`
},

{
title:"for",
desc:"Döngü",
code:`for i in range(5):
    print(i)`
},

{
title:"Fonksiyon",
desc:"Fonksiyon oluşturma",
code:`def selam():
    print("Merhaba")

selam()`
}

]

function render(){

if(!user){

app.innerHTML="<h2>Giriş yap</h2>"

return
}

let html=`<h3>Kullanıcı: ${user} | XP: ${xp}</h3>`

html+=`<div class="grid">`

lessons.forEach((l,i)=>{

html+=`

<div class="card" onclick="openLesson(${i})">

<h3>${l.title}</h3>

<p>${l.desc}</p>

</div>

`

})

html+="</div>"

app.innerHTML=html

}

function openLesson(i){

let l=lessons[i]

app.innerHTML=`

<h2>${l.title}</h2>

<p>${l.desc}</p>

<textarea id="editor">${l.code}</textarea>

<br><br>

<button onclick="runPython()">Çalıştır</button>

<button onclick="addXP()">XP kazan</button>

<button onclick="certificate()">Sertifika</button>

<div id="console" class="console"></div>

`

}

async function runPython(){

let code=editor.value

try{

let result=await pyodide.runPythonAsync(code)

console.innerText=result || "Kod çalıştı"

}catch(e){

console.innerText=e

}

}

function addXP(){

xp+=10

localStorage.setItem("xp",xp)

alert("10 XP kazandın")

render()

}

function certificate(){

let w=window.open()

w.document.write(`

<h1 style="text-align:center;margin-top:200px">

PYTHON SERTİFİKASI

</h1>

<h2 style="text-align:center">

${user}

</h2>

`)

}

function openLogin(){

loginModal.classList.remove("hidden")

}

function login(){

user=username.value

localStorage.setItem("user",user)

loginModal.classList.add("hidden")

render()

}

function openAdmin(){

adminModal.classList.remove("hidden")

}

function adminLogin(){

if(adminpass.value=="ruhi123"){

adminModal.classList.add("hidden")

app.innerHTML=`

<h2>Admin Panel</h2>

<button onclick="localStorage.clear()">Verileri sıfırla</button>

`

}else{

alert("Şifre yanlış")

}

}

render()

</script>

</body>
</html>
