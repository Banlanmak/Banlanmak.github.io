<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pyodide Grafik Örneği</title>
<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>
<style>
body{font-family:sans-serif; background:#f0f0f0; padding:20px;}
input, button{padding:8px; margin-top:5px;}
#output{background:#111;color:#0f0;padding:10px; min-height:50px; white-space:pre-wrap;}
img{max-width:100%; margin-top:10px; border:1px solid #333;}
</style>
</head>
<body>

<h2>Pyodide ile Kare Grafiği</h2>
<p>Sayı gir ve karelerini görselleştir:</p>
<input type="number" id="number" value="10" min="1">
<button onclick="runExample()">ÇALIŞTIR 🚀</button>

<div id="output"></div>
<img id="plot-img">

<script>
let pyodide = null;

async function loadPy(){
    if(!pyodide){
        document.getElementById("output").innerText = "Python yükleniyor...";
        pyodide = await loadPyodide({indexURL:"https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"});
        await pyodide.loadPackage(["numpy","matplotlib"]);
    }
    return pyodide;
}

async function runExample(){
    const n = parseInt(document.getElementById("number").value) || 10;
    const output = document.getElementById("output");
    const plotImg = document.getElementById("plot-img");

    output.innerText = "Çalıştırılıyor...";
    plotImg.src = "";

    const py = await loadPy();

    try{
        await py.runPythonAsync(`
import numpy as np
import matplotlib.pyplot as plt
from io import BytesIO
import base64
import sys
from io import StringIO

sys.stdout = StringIO()

n = ${n}
x = np.arange(1, n+1)
y = x**2

plt.figure(figsize=(6,4))
plt.plot(x, y, marker='o', color='purple')
plt.title('1..'+str(n)+' Kareleri')
plt.xlabel('Sayı')
plt.ylabel('Karesi')
plt.grid(True)
buf = BytesIO()
plt.savefig(buf, format='png')
buf.seek(0)
img_base64 = base64.b64encode(buf.read()).decode('utf-8')
plt.close()
        `);

        const consoleOutput = py.runPython("sys.stdout.getvalue()");
        output.innerText = consoleOutput || "✅ Kod başarıyla çalıştı!";
        const imgBase64 = py.runPython("img_base64");
        plotImg.src = "data:image/png;base64," + imgBase64;

    } catch(err){
        output.innerText = "Hata: " + err;
    }
}
</script>

</body>
</html>
