<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🐍 Python Çalıştırıcı</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
@import url('https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Space+Grotesk:wght@500;600;700&display=swap');
body{font-family:'Comic Neue',cursive}
.title-font{font-family:'Space Grotesk',sans-serif}
.console{background:#0b1120;font-family:Courier New}
.code-editor{font-family:Courier New;resize:none}
</style>
</head>

<body class="bg-gradient-to-br from-indigo-50 to-purple-100 min-h-screen">

<!-- LOGIN -->
<div id="login-screen" class="fixed inset-0 bg-black/80 flex items-center justify-center">
<div class="bg-white rounded-3xl shadow-2xl max-w-md w-full p-10">

<div class="text-center mb-6">
<div class="text-7xl">🐍</div>
<h1 class="title-font text-3xl font-bold text-purple-700">Python Çalıştırıcı</h1>
<p class="text-gray-500">Tarayıcıda Gerçek Python</p>
</div>

<input id="username" placeholder="Adın"
class="w-full px-5 py-3 border rounded-xl mb-4">

<div class="grid grid-cols-2 gap-4">
<button onclick="normalGiris()" class="py-4 border-2 border-purple-600 text-purple-700 rounded-xl font-bold">Normal</button>
<button onclick="premiumGiris()" class="py-4 bg-purple-600 text-white rounded-xl font-bold">Premium</button>
</div>

</div>
</div>

<!-- APP -->
<div id="main-app" class="hidden">

<header class="bg-white shadow-xl">
<div class="max-w-7xl mx-auto p-4 flex justify-between">

<div class="flex items-center gap-3">
<span class="text-3xl">🐍</span>
<h1 class="title-font text-2xl font-bold">Python IDE</h1>
</div>

<div class="flex gap-3 items-center">
<span id="user-badge" class="font-bold"></span>
<button onclick="logout()" class="text-red-600">Çıkış</button>
</div>

</div>
</header>

<div class="max-w-7xl mx-auto p-6 flex gap-6">

<!-- EDITOR -->
<div class="flex-1 bg-white rounded-3xl shadow-xl p-6">

<h2 class="text-xl font-bold mb-3">
<i class="fa-solid fa-code"></i> Kod
</h2>

<textarea id="code-editor" rows="18"
class="code-editor w-full p-4 text-green-200 bg-[#0b1120] rounded-xl border"></textarea>

<div class="flex gap-4 mt-4">
<button onclick="runCode()" class="flex-1 py-3 bg-green-600 text-white rounded-xl font-bold">
ÇALIŞTIR 🚀
</button>

<button onclick="resetCode()" class="px-6 py-3 border rounded-xl font-bold">
Sıfırla
</button>
</div>

</div>

<!-- OUTPUT -->
<div class="w-96 bg-white rounded-3xl shadow-xl p-6 flex flex-col">

<h2 class="text-xl font-bold mb-3">Çıktı</h2>

<div id="output-console" class="console text-green-300 p-4 rounded-xl flex-1 overflow-auto mb-4"></div>

<div id="plot-area" class="bg-gray-900 rounded-xl p-2 hidden">
<img id="plot-img">
</div>

</div>

</div>
</div>

<script src="https://cdn.jsdelivr.net/pyodide/v0.29.3/full/pyodide.js"></script>

<script>

let pyodide=null
let username=""
let isPremium=false
const secretPassword="ruhi123"

async function loadPy(){

if(!pyodide){

document.getElementById("output-console").innerHTML="Python yükleniyor..."

pyodide=await loadPyodide({
indexURL:"https://cdn.jsdelivr.net/pyodide/v0.29.3/full/"
})

await pyodide.loadPackage(["matplotlib","numpy"])

}

return pyodide

}

function normalGiris(){

username=document.getElementById("username").value||"Öğrenci"
isPremium=false
start()

}

function premiumGiris(){

let s=prompt("Şifre:")

if(s===secretPassword){

username=document.getElementById("username").value||"Öğrenci"
isPremium=true
start()

}else{

alert("Yanlış şifre")

}

}

function start(){

document.getElementById("login-screen").style.display="none"
document.getElementById("main-app").classList.remove("hidden")

document.getElementById("user-badge").innerHTML=
username+(isPremium?" ⭐":" 👤")

document.getElementById("code-editor").value=
`# Python kodunu yaz

print("Merhaba Dünya")

for i in range(5):
    print("Sayı:",i)
`

}

async function runCode(){

let code=document.getElementById("code-editor").value
let output=document.getElementById("output-console")

output.innerHTML="Çalıştırılıyor...<br>"

if(code.includes("tkinter")){

output.innerHTML+="⚠️ Tkinter tarayıcıda çalışmaz."
return

}

try{

let py=await loadPy()

py.runPython(`
import sys
from io import StringIO
sys.stdout=StringIO()
`)

py.runPython(code)

let result=py.runPython("sys.stdout.getvalue()")

output.innerHTML+=result||"Kod çalıştı"

}catch(e){

output.innerHTML+="Hata: "+e

}

}

function resetCode(){

document.getElementById("code-editor").value=
`print("Merhaba Dünya")`

}

function logout(){

location.reload()

}

</script>

</body>
</html>
