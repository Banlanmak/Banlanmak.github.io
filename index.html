        .dark ::-webkit-scrollbar-track { background: #1e1e2f; }
        .dark ::-webkit-scrollbar-thumb { background: #6b21a8; }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }

                { emoji:"📦", title:"40. Modül Oluşturma", desc:"Kendi modülümüzü yazıp import edebiliriz.", code:"# modul.py dosyası oluştur\n# def topla(a,b): return a+b\n# import modul" },
                { emoji:"🌐", title:"41. Python ile Neler Yapılır?", desc:"Web geliştirme, yapay zeka, veri analizi, oyun geliştirme... Hayal gücünle sınırlı!", code:"print('Python ile geleceğini kodla! 🚀')" },
                { emoji:"🏆", title:"Tebrikler! 🎉 Müfredat Tamamlandı", desc:"9. sınıf Bilişim Teknolojileri Python konularını bitirdin! Artık kendi projelerini geliştirebilirsin.", code:"print('🎓 BAŞARILAR DİLERİM! 🐍')\nprint('Bir sonraki adım: Pygame ile oyun yap!')" }
            ];

            // ---------- UYGULAMA DURUMU ----------
            let currentTopic = 0;
            let pythonState = {};   // Değişkenleri saklamak için
            let consoleOutput = []; // Konsol geçmişi

            // DOM Elemanları
            const progressBar = document.getElementById('progress-bar');
            const progressText = document.getElementById('progress-text');
            const contentArea = document.getElementById('content-area');
            const codeEditor = document.getElementById('code-editor');
            const outputConsole = document.getElementById('output-console');
            const sidebarDiv = document.getElementById('sidebar-content');
            const mobileSidebar = document.getElementById('mobile-sidebar');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const topicIndicator = document.getElementById('topic-indicator');

            // Yardımcı Fonksiyonlar
            function updateSidebars() {
                let html = '';
                topics.forEach((t, idx) => {
                    const activeClass = idx === currentTopic ? 'bg-purple-100 dark:bg-purple-900/60 border-l-4 border-purple-500 font-bold' : '';
                    html += `
                        <div onclick="goToTopic(${idx})" class="topic-item flex items-center gap-3 px-4 py-3 rounded-xl cursor-pointer transition-all ${activeClass}">
                            <span class="text-2xl">${t.emoji}</span>
                            <span class="text-sm">${t.title}</span>
                        </div>
                    `;
                });
                if (sidebarDiv) sidebarDiv.innerHTML = html;
                if (mobileSidebar) mobileSidebar.innerHTML = html;
            }

            function updateUI() {
                const t = topics[currentTopic];
                const percent = ((currentTopic + 1) / topics.length) * 100;
                progressBar.style.width = percent + '%';
                progressText.textContent = `Konu ${currentTopic + 1} / ${topics.length}`;
                topicIndicator.textContent = `${currentTopic + 1} / ${topics.length}`;

                contentArea.innerHTML = `
                    <div class="flex flex-wrap items-center gap-4 sm:gap-6 mb-6">
                        <div class="text-6xl sm:text-7xl bg-gradient-to-br from-purple-200 to-blue-200 dark:from-purple-800 dark:to-blue-800 p-4 rounded-2xl shadow-inner">${t.emoji}</div>
                        <h2 class="title-font text-3xl sm:text-4xl lg:text-5xl font-bold bg-gradient-to-r from-purple-700 to-blue-600 bg-clip-text text-transparent dark:from-purple-300 dark:to-blue-300">${t.title}</h2>
                    </div>
                    <div class="text-lg sm:text-xl lg:text-2xl leading-relaxed text-gray-700 dark:text-gray-200 space-y-4">
                        ${t.desc}
                    </div>
                `;

                // Kod editörünü güncelle (state'i korumak istemeyebiliriz, sıfırlamak daha iyi)
                codeEditor.value = t.code || "# Kodunu buraya yaz veya düzenle 🐍";
                
                // Buton durumları
                prevBtn.disabled = (currentTopic === 0);
                nextBtn.disabled = (currentTopic === topics.length - 1);
                if (currentTopic === 0) prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
                else prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                if (currentTopic === topics.length - 1) nextBtn.classList.add('opacity-50', 'cursor-not-allowed');
                else nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }

            // Kod Çalıştırma Motoru (Basit Python Benzetimi)
            function runCode() {
                const code = codeEditor.value;
                // Konsolu temizle (isteğe bağlı: geçmişi korumak için append yapabiliriz, şimdilik temizleyip yeniden yazalım)
                outputConsole.innerHTML = '';
                consoleOutput = [];
                
                // Satırları ayır, boş satırları ve yorumları atla (basit)
                const lines = code.split('\n');
                let i = 0;
                
                // Özel durum: input'ları yönetmek için prompt kullanacağız.
                // Döngü ve if bloklarını basitçe simüle edeceğiz.
                
                const appendOutput = (text, isError = false) => {
                    const className = isError ? 'text-red-400' : 'text-emerald-200';
                    outputConsole.innerHTML += `<span class="${className}">${text}</span><br>`;
                    consoleOutput.push(text);
                };
                
                // Değerlendirme fonksiyonu (güvenli eval alternatifi)
                function safeEval(expr, context) {
                    // Değişken isimlerini ve değerlerini al
                    const vars = Object.keys(context);
                    const vals = Object.values(context);
                    try {
                        // Function constructor kullanarak ifadeyi değerlendir
                        const func = new Function(...vars, `return (${expr});`);
                        return func(...vals);
                    } catch (e) {
                        throw new Error(`İfade hatası: ${e.message}`);
                    }
                }
                
                // Python benzeri satır satır yorumlama
                while (i < lines.length) {
                    let line = lines[i].trim();
                    if (line === '' || line.startsWith('#')) {
                        i++;
                        continue;
                    }
                    
                    // Blok yapıları için basit destek (if, for, while)
                    // İç içe blokları tam desteklemez, sadece tek satır veya basit bloklar
                    if (line.startsWith('if ')) {
                        // if condition: sonraki satırlar girintili mi kontrol et
                        const conditionMatch = line.match(/^if\s+(.+):\s*$/);
                        if (conditionMatch) {
                            const condition = conditionMatch[1];
                            let result;
                            try {
                                result = safeEval(condition, pythonState);
                            } catch (e) {
                                appendOutput(`❌ Hata: ${e.message}`, true);
                                break;
                            }
                            // Girintili bloğu bul
                            let j = i + 1;
                            const blockLines = [];
                            while (j < lines.length && (lines[j].startsWith('    ') || lines[j].startsWith('\t'))) {
                                blockLines.push(lines[j].trim());
                                j++;
                            }
                            if (result) {
                                // Bloğu çalıştır (rekürsif değil, sadece print vs)
                                for (let bline of blockLines) {
                                    executeSimpleLine(bline, appendOutput);
                                }
                            }
                            i = j; // else veya sonraki satıra geç
                            continue;
                        }
                    } else if (line.startsWith('for ')) {
                        // for i in range(...): veya for i in list:
                        const forMatch = line.match(/^for\s+(\w+)\s+in\s+(.+):\s*$/);
                        if (forMatch) {
                            const varName = forMatch[1];
                            const iterExpr = forMatch[2];
                            let iterable;
                            try {
                                iterable = safeEval(iterExpr, pythonState);
                            } catch (e) {
                                appendOutput(`❌ Hata: ${e.message}`, true);
                                break;
                            }
                            // range veya liste
                            let values = [];
                            if (typeof iterable === 'object' && iterable !== null && iterable.constructor === Array) {
                                values = iterable;
                            } else if (typeof iterable === 'number') {
                                // range(n) gibi düşün
                                values = Array.from({length: iterable}, (_,k) => k);
                            } else if (iterable && iterable.constructor === Object && iterable.start !== undefined) {
                                // range obje simülasyonu (ileride geliştirilebilir)
                                values = Array.from({length: 5}, (_,k) => k); // geçici
                            } else {
                                values = [0,1,2]; // fallback
                            }
                            
                            let j = i + 1;
                            const blockLines = [];
                            while (j < lines.length && (lines[j].startsWith('    ') || lines[j].startsWith('\t'))) {
                                blockLines.push(lines[j].trim());
                                j++;
                            }
                            for (let val of values) {
                                pythonState[varName] = val;
                                for (let bline of blockLines) {
                                    executeSimpleLine(bline, appendOutput);
                                }
                            }
                            i = j;
                            continue;
                        }
                    } else if (line.startsWith('while ')) {
                        const whileMatch = line.match(/^while\s+(.+):\s*$/);
                        if (whileMatch) {
                            const condition = whileMatch[1];
                            let j = i + 1;
                            const blockLines = [];
                            while (j < lines.length && (lines[j].startsWith('    ') || lines[j].startsWith('\t'))) {
                                blockLines.push(lines[j].trim());
                                j++;
                            }
                            // Sonsuz döngü koruması (max 1000 iterasyon)
                            let iter = 0;
                            while (iter < 1000) {
                                let condResult;
                                try {
                                    condResult = safeEval(condition, pythonState);
                                } catch (e) {
                                    appendOutput(`❌ Hata: ${e.message}`, true);
                                    break;
                                }
                                if (!condResult) break;
                                for (let bline of blockLines) {
                                    executeSimpleLine(bline, appendOutput);
                                }
                                iter++;
                            }
                            if (iter >= 1000) appendOutput('⚠️ Sonsuz döngü algılandı, durduruldu.', true);
                            i = j;
                            continue;
                        }
                    } else {
                        executeSimpleLine(line, appendOutput);
                        i++;
                    }
                }
                
                function executeSimpleLine(line, outputFn) {
                    // Atama: değişken = ifade
                    const assignMatch = line.match(/^(\w+)\s*=\s*(.+)$/);
                    if (assignMatch) {
                        const varName = assignMatch[1];
                        const expr = assignMatch[2];
                        try {
                            const value = safeEval(expr, pythonState);
                            pythonState[varName] = value;
                        } catch (e) {
                            outputFn(`❌ Atama hatası: ${e.message}`, true);
                        }
                        return;
                    }
                    // print(...)
                    const printMatch = line.match(/^print\((.*)\)$/);
                    if (printMatch) {
                        let argsStr = printMatch[1];
                        // Virgüllerle ayrılmış argümanları ayır (basit)
                        const args = argsStr.split(',').map(s => s.trim());
                        const results = args.map(arg => {
                            if (arg.startsWith("'") || arg.startsWith('"')) {
                                // string literal
                                return arg.slice(1, -1);
                            } else if (arg === 'True') return true;
                            else if (arg === 'False') return false;
                            else if (!isNaN(arg) && arg !== '') return Number(arg);
                            else {
                                try {
                                    return safeEval(arg, pythonState);
                                } catch {
                                    return arg; // string olarak kabul et
                                }
                            }
                        });
                        outputFn(results.join(' '));
                        return;
                    }
                    // input ataması: var = input("mesaj")
                    const inputAssignMatch = line.match(/^(\w+)\s*=\s*input\((.*)\)$/);
                    if (inputAssignMatch) {
                        const varName = inputAssignMatch[1];
                        const promptMsg = inputAssignMatch[2].replace(/['"]/g, '');
                        const userInput = prompt(promptMsg + '\n(Değer giriniz)') || '';
                        pythonState[varName] = userInput;
                        outputFn(`→ Girilen: ${userInput}`);
                        return;
                    }
                    // import ifadesi (basit)
                    if (line.startsWith('import ')) {
                        const module = line.substring(7).trim();
                        outputFn(`📦 '${module}' modülü içe aktarıldı (simülasyon).`);
                        return;
                    }
                    // Diğer: doğrudan ifade değerlendir (tek başına)
                    try {
                        const val = safeEval(line, pythonState);
                        if (val !== undefined) outputFn(String(val));
                    } catch {
                        outputFn(`⚠️ Anlaşılamayan satır: ${line}`, true);
                    }
                }
                
                if (outputConsole.innerHTML === '') {
                    outputConsole.innerHTML = '<span class="text-gray-400">✅ Kod çalıştı, çıktı üretilmedi.</span>';
                }
            }

            function resetCode() {
                codeEditor.value = topics[currentTopic].code || '';
                // pythonState'i sıfırlamak isteyebiliriz, ama şimdilik dokunmayalım.
            }

            function clearConsole() {
                outputConsole.innerHTML = '<span class="text-gray-400">✨ Konsol temizlendi.</span>';
                consoleOutput = [];
            }

            // Gezinme Fonksiyonları
            function nextTopic() {
                if (currentTopic < topics.length - 1) {
                    currentTopic++;
                    updateUI();
                    updateSidebars();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }

            function prevTopic() {
                if (currentTopic > 0) {
                    currentTopic--;
                    updateUI();
                    updateSidebars();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            }

            window.goToTopic = function(n) {
                currentTopic = n;
                updateUI();
                updateSidebars();
                toggleMobileMenu(false); // menüyü kapat
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            // Dark Mode
            function toggleDarkMode() {
                document.documentElement.classList.toggle('dark');
                const moon = document.getElementById('dark-icon');
                const sun = document.getElementById('light-icon');
                if (document.documentElement.classList.contains('dark')) {
                    moon.classList.add('hidden');
                    sun.classList.remove('hidden');
                } else {
                    moon.classList.remove('hidden');
                    sun.classList.add('hidden');
                }
            }

            // Mobil Menü
            function toggleMobileMenu(show) {
                const menu = document.getElementById('mobile-menu');
                if (show === undefined) {
                    menu.classList.toggle('hidden');
                } else if (show) {
                    menu.classList.remove('hidden');
                } else {
                    menu.classList.add('hidden');
                }
            }
            window.toggleMobileMenu = toggleMobileMenu;

            // Başlangıç
            window.onload = () => {
                updateSidebars();
                updateUI();
                // Dark mode ikonunu ayarla
                if (document.documentElement.classList.contains('dark')) {
                    document.getElementById('dark-icon').classList.add('hidden');
                    document.getElementById('light-icon').classList.remove('hidden');
                }
                // Mobil menü dışına tıklama
                document.getElementById('mobile-menu').addEventListener('click', (e) => {
                    if (e.target === document.getElementById('mobile-menu')) toggleMobileMenu(false);
                });
            };

            // Global fonksiyonları window'a ata
            window.runCode = runCode;
            window.resetCode = resetCode;
            window.clearConsole = clearConsole;
            window.nextTopic = nextTopic;
            window.prevTopic = prevTopic;
            window.toggleDarkMode = toggleDarkMode;
        })();
    </script>
</body>
