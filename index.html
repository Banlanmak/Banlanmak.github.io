<!DOCTYPE html>
<html lang="tr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Python Akademi</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/pyodide@0.26.1/pyodide.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>

body{
font-family:Segoe UI;
background:linear-gradient(135deg,#eef2ff,#fdf4ff);
}

.card3d{
transform-style:preserve-3d;
transition:.4s;
}

.card3d:hover{
transform:rotateY(10deg) rotateX(10deg) scale(1.05);
}

.console{
background:#020617;
color:#22c55e;
font-family:monospace;
}

.editor{
background:black;
color:#22c55e;
font-family:monospace;
}

</style>

</head>

<body class="min-h-screen">

<div class="bg-white shadow p-5 flex justify-between items-center">

<h1 class="text-3xl font-bold text-purple-700">
🐍 Python Akademi
</h1>

<div class="flex gap-4">

<button onclick="showLogin()" class="bg-purple-600 text-white px-4 py-2 rounded">
Giriş
</button>

<button onclick="showAdmin()" class="bg-gray-800 text-white px-4 py-2 rounded">
Admin
</button>

</div>

</div>

<div class="max-w-7xl mx-auto p-8">

<div id="mainUI"></div>

</div>

<div id="loginModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-xl font-bold mb-4">Öğrenci Giriş</h2>

<input id="username" placeholder="Kullanıcı adı"
class="border p-2 w-full mb-3"/>

<button onclick="login()" class="bg-purple-600 text-white px-4 py-2 rounded w-full">
Giriş Yap
</button>

</div>

</div>

<div id="adminModal" class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center">

<div class="bg-white p-8 rounded shadow w-96">

<h2 class="text-xl font-bold mb-4">Admin Giriş</h2>

<input id="adminpass" type="password"
placeholder="Şifre"
class="border p-2 w-full mb-3"/>

<button onclick="adminLogin()" class="bg-gray-800 text-white px-4 py-2 rounded w-full">
Giriş
</button>

</div>

</div>

<script>

let pyodide
let user=null
let score=0
let current=0

async function init(){
pyodide=await loadPyodide()
}

init()

const topics=[

{
title:"Python Nedir",
desc:"Python kolay öğrenilen programlama dilidir.",
code:"print('Python öğreniyorum')"
},

{
title:"print",
desc:"Ekrana yazı yazdırır",
code:"print('Merhaba Dünya')"
},

{
title:"Değişken",
desc:"Veri saklamak için kullanılır",
code:"yas=15\nprint(yas)"
},

{
title:"if",
desc:"Koşul yapısı",
code:"yas=20\nif yas>18:\n print('Yetişkin')"
},

{
title:"for",
desc:"Döngü yapısı",
code:"for i in range(5):\n print(i)"
}

]

function render(){

let html=""

if(!user){

html=`

<div class="text-center text-2xl mt-20">
Giriş yaparak öğrenmeye başla
</div>

`

}else{

html+=`

<div class="grid grid-cols-3 gap-6">

`

topics.forEach((t,i)=>{

html+=`

<div class="card3d bg-white p-6 rounded shadow cursor-pointer"
onclick="openTopic(${i})">

<h3 class="text-xl font-bold">${t.title}</h3>

<p class="text-gray-600">${t.desc}</p>

</div>

`

})

html+=`</div>`

}

mainUI.innerHTML=html

}

function showLogin(){
loginModal.classList.remove("hidden")
}

function login(){

user=username.value

localStorage.setItem("user",user)

loginModal.classList.add("hidden")

render()

}

function showAdmin(){

adminModal.classList.remove("hidden")

}

function adminLogin(){

if(adminpass.value==="ruhi123"){

adminModal.classList.add("hidden")

openAdmin()

}else{

alert("Şifre yanlış")

}

}

function openAdmin(){

mainUI.innerHTML=`

<h2 class="text-3xl font-bold mb-6">Admin Panel</h2>

<div class="bg-white p-6 rounded shadow">

<p>Toplam kullanıcı: ${localStorage.length}</p>

<button onclick="resetData()" class="bg-red-600 text-white px-4 py-2 rounded mt-4">
Verileri Sıfırla
</button>

</div>

`

}

function resetData(){

localStorage.clear()

alert("Veriler silindi")

}

function openTopic(i){

let t=topics[i]

mainUI.innerHTML=`

<h2 class="text-3xl font-bold mb-4">${t.title}</h2>

<p class="mb-4">${t.desc}</p>

<textarea id="editor"
class="editor w-full h-60 p-4 rounded">${t.code}</textarea>

<button onclick="runPython()"
class="bg-green-600 text-white px-4 py-2 mt-4 rounded">
Çalıştır
</button>

<div id="console" class="console mt-4 p-4 h-40"></div>

<button onclick="certificate()"
class="bg-purple-600 text-white px-4 py-2 mt-6 rounded">
Sertifika Al
</button>

`

}

async function runPython(){

let code=editor.value

try{

let result=await pyodide.runPythonAsync(code)

console.innerText=result||"Kod çalıştı"

}catch(e){

console.innerText=e

}

}

function certificate(){

let name=user||"Öğrenci"

let win=window.open()

win.document.write(`

<h1 style="text-align:center;margin-top:100px">

Python Akademi Sertifikası

</h1>

<h2 style="text-align:center">

${name}

</h2>

<p style="text-align:center">

Python eğitimini başarıyla tamamladı

</p>

`)

}

render()

</script>

</body>
</html>
